<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Wandhalter 3D</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #111316; overflow: hidden; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
  canvas { display: block; }

  #topbar {
    position: absolute; top: 0; left: 0; right: 0; height: 52px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.55), transparent);
    pointer-events: none;
  }
  #title { color: #e8e8e8; font-size: 12px; font-weight: 500; letter-spacing: 4px; text-transform: uppercase; opacity: 0.85; }
  #badge { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: #888; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; padding: 4px 12px; border-radius: 20px; }

  #dims {
    position: absolute; top: 64px; right: 20px;
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px; padding: 14px 18px; pointer-events: none; backdrop-filter: blur(6px);
  }
  #dims h3 { color: rgba(255,255,255,0.3); font-size: 9px; letter-spacing: 2.5px; text-transform: uppercase; margin-bottom: 10px; font-weight: 400; }
  .dim-row { display: flex; justify-content: space-between; gap: 20px; margin-bottom: 6px; align-items: baseline; }
  .dim-row:last-child { margin-bottom: 0; }
  .dim-label { color: rgba(255,255,255,0.3); font-size: 10px; }
  .dim-value { color: rgba(255,255,255,0.7); font-size: 11px; font-weight: 500; font-variant-numeric: tabular-nums; }

  #hint {
    position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 16px; pointer-events: none;
  }
  .hint-item {
    display: flex; align-items: center; gap: 6px;
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.07);
    border-radius: 20px; padding: 5px 12px;
    color: rgba(255,255,255,0.3); font-size: 10px; white-space: nowrap;
  }

  #autoBtn {
    position: absolute; bottom: 20px; right: 20px;
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px; color: rgba(255,255,255,0.4);
    font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
    padding: 6px 14px; cursor: pointer; transition: all 0.2s; font-family: inherit;
  }
  #autoBtn:hover { background: rgba(255,255,255,0.09); color: rgba(255,255,255,0.7); }
  #autoBtn.active { background: rgba(120,160,255,0.12); border-color: rgba(120,160,255,0.3); color: rgba(140,180,255,0.8); }
</style>
</head>
<body>

<div id="topbar">
  <div id="title">Wandhalter — Papierablage</div>
  <div id="badge">3D Vorschau</div>
</div>

<div id="dims">
  <h3>Maße</h3>
  <div class="dim-row"><span class="dim-label">Breite</span><span class="dim-value">8.0 cm</span></div>
  <div class="dim-row"><span class="dim-label">Tiefe</span><span class="dim-value">2.0 cm</span></div>
  <div class="dim-row"><span class="dim-label">Höhe links</span><span class="dim-value">11.5 cm</span></div>
  <div class="dim-row"><span class="dim-label">Höhe rechts</span><span class="dim-value">7.5 cm</span></div>
  <div class="dim-row"><span class="dim-label">Wandstärke</span><span class="dim-value">0.35 cm</span></div>
</div>

<div id="hint">
  <div class="hint-item">⟳ Linksklick = Drehen</div>
  <div class="hint-item">⊕ Scrollrad = Zoom</div>
  <div class="hint-item">✥ Rechtsklick = Verschieben</div>
</div>

<button id="autoBtn" class="active">Auto-Rotation</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ─── Scene ─────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111316);
scene.fog = new THREE.FogExp2(0x111316, 0.016);

const camera = new THREE.PerspectiveCamera(38, innerWidth / innerHeight, 0.01, 500);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;
document.body.appendChild(renderer.domElement);

// ─── Lights ────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xffffff, 0.4));

const key = new THREE.DirectionalLight(0xfff6e8, 1.5);
key.position.set(10, 22, 14);
key.castShadow = true;
key.shadow.mapSize.set(2048, 2048);
key.shadow.camera.near = 1; key.shadow.camera.far = 80;
key.shadow.camera.left = -20; key.shadow.camera.right = 20;
key.shadow.camera.top = 24; key.shadow.camera.bottom = -16;
key.shadow.bias = -0.0004;
scene.add(key);

const fill = new THREE.DirectionalLight(0x8899cc, 0.45);
fill.position.set(-14, 6, -6);
scene.add(fill);

const rim = new THREE.DirectionalLight(0xaabbee, 0.3);
rim.position.set(2, -6, -16);
scene.add(rim);

// ─── Ground ────────────────────────────────────────────────────
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(120, 120),
  new THREE.MeshStandardMaterial({ color: 0x181a1e, roughness: 0.92, metalness: 0.04 })
);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -8;
ground.receiveShadow = true;
scene.add(ground);

const grid = new THREE.GridHelper(60, 40, 0x1e2228, 0x1e2228);
grid.position.y = -7.98;
grid.material.opacity = 0.55; grid.material.transparent = true;
scene.add(grid);

// ─── Material ──────────────────────────────────────────────────
// No DoubleSide needed — all faces explicitly built
const mat = new THREE.MeshStandardMaterial({
  color: 0xdde0e6,
  roughness: 0.38,
  metalness: 0.22,
});
const holeMat = new THREE.MeshStandardMaterial({
  color: 0x0d0f12,
  roughness: 0.9,
  metalness: 0.1,
});

// ─── Dimensions (1 unit = 1 cm) ────────────────────────────────
const W  = 8;      // width  X
const D  = 2;      // depth  Z  (0 = front, -D = back)
const Hl = 11.5;   // height left
const Hr = 7.5;    // height right
const T  = 0.35;   // wall thickness

// Slope: at any x position, top height = Hl + (Hr - Hl) * (x / W)
function topH(x) { return Hl + (Hr - Hl) * (x / W); }

const group = new THREE.Group();
scene.add(group);

function mesh(geo) {
  const m = new THREE.Mesh(geo, mat);
  m.castShadow = true; m.receiveShadow = true;
  group.add(m);
}

// ── Generic extruded flat polygon ──────────────────────────────
// pts: array of [x,y] in CCW order (front face at z=0, back at z=-depth)
function extrudePoly(pts, depth) {
  const n = pts.length;
  const verts = [];
  // front (z=0), back (z=-depth)
  for (const [x, y] of pts) verts.push(x, y, 0);
  for (const [x, y] of pts) verts.push(x, y, -depth);

  const indices = [];
  // front face — simple fan from vertex 0
  for (let i = 1; i < n - 1; i++) indices.push(0, i, i + 1);
  // back face — reversed fan
  for (let i = 1; i < n - 1; i++) indices.push(n, n + i + 1, n + i);
  // side faces
  for (let i = 0; i < n; i++) {
    const j = (i + 1) % n;
    // front-i, back-i, back-j, front-j
    indices.push(i, n + i, n + j, i, n + j, j);
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(verts), 3));
  geo.setIndex(indices);
  geo.computeVertexNormals();
  return geo;
}

// ─────────────────────────────────────────────────────────────
// 1. BACK WALL  — trapezoid flush with back face
//    front of back wall at z = -(D-T), back at z = -D
// ─────────────────────────────────────────────────────────────
{
  const pts = [[0,0],[W,0],[W,Hr],[0,Hl]]; // CCW
  const geo = extrudePoly(pts, T);
  const m = new THREE.Mesh(geo, mat);
  m.position.set(0, 0, -D);   // back at -D, front of slice at -(D-T)... but extruded forward (+z)
  // extrudePoly goes from z=0 to z=-depth, so place at z=-(D-T) going to z=-D is: pos z=-(D-T), depth=T
  m.position.set(0, 0, -(D - T));
  m.castShadow = true; m.receiveShadow = true;
  group.add(m);
}

// ─────────────────────────────────────────────────────────────
// 2. FRONT WALL — same trapezoid at z=0 going to z=-T
// ─────────────────────────────────────────────────────────────
{
  const pts = [[0,0],[W,0],[W,Hr],[0,Hl]];
  mesh(extrudePoly(pts, T));
}

// ─────────────────────────────────────────────────────────────
// 3. FLOOR — rectangle at y=0
// ─────────────────────────────────────────────────────────────
{
  // pts in XZ plane, then rotate — easier to just build manually
  const pts = [[0,0],[W,0],[W,-D],[0,-D]]; // x,z as x,y then we'll fix
  // Build as box for simplicity
  const geo = new THREE.BoxGeometry(W, T, D);
  const m = new THREE.Mesh(geo, mat);
  m.position.set(W/2, T/2, -D/2);
  m.castShadow = true; m.receiveShadow = true;
  group.add(m);
}

// ─────────────────────────────────────────────────────────────
// 4. LEFT SIDE WALL — pentagon (angled top, bevel matches slope)
//    The top-left corner at z=0  has height Hl (front top = topH(0) = Hl, since x=T≈0)
//    The top-left corner at z=-D has height Hl (it's flush — same height, no slope in Z)
//    BUT: actually the TOP edge of the left wall must follow the diagonal:
//    At x=0 the height is Hl, at x=T (inner edge) height is topH(T).
//    Since T is tiny this is nearly vertical — we model the wall as a simple
//    rectangle of height Hl on the outer face and topH(T) on the inner face.
//    For visual purposes: use a pentagon with the top cut parallel to the slope.
//    Outer face (x=0): bottom-left(0,0), bottom-right(0,0,z=-D), top at Hl
//    Inner face (x=T): same but top at topH(T)
//    We extrude in X direction (thickness = T).
//
//    Easiest: build as custom BufferGeometry with 8 vertices.
//    The left wall occupies x: 0→T, z: 0→-D, y: 0→topH(x)
//    Outer left face (x=0): rect from y=0..Hl, z=0..-D
//    Inner right face (x=T): rect from y=0..topH(T), z=0..-D
//    Top face: parallelogram connecting both tops
//    Front face (z=0): trapezoid y=0..Hl (x=0) to y=0..topH(T) (x=T)
//    Back face (z=-D): same
{
  const hOuter = Hl;          // left outer top
  const hInner = topH(T);    // left inner top (slightly lower)

  // 8 vertices:
  // 0: (0, 0,  0)   front-outer-bottom
  // 1: (T, 0,  0)   front-inner-bottom
  // 2: (T, hInner, 0) front-inner-top
  // 3: (0, hOuter, 0) front-outer-top
  // 4: (0, 0, -D)   back-outer-bottom
  // 5: (T, 0, -D)   back-inner-bottom
  // 6: (T, hInner,-D) back-inner-top
  // 7: (0, hOuter,-D) back-outer-top

  const v = new Float32Array([
    0, 0,      0,
    T, 0,      0,
    T, hInner, 0,
    0, hOuter, 0,
    0, 0,      -D,
    T, 0,      -D,
    T, hInner, -D,
    0, hOuter, -D,
  ]);
  const idx = [
    0,1,2, 0,2,3,       // front face
    4,6,5, 4,7,6,       // back face
    0,4,5, 0,5,1,       // bottom
    3,2,6, 3,6,7,       // top (slanted)
    0,3,7, 0,7,4,       // outer left
    1,5,6, 1,6,2,       // inner right
  ];
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(v, 3));
  geo.setIndex(idx);
  geo.computeVertexNormals();
  mesh(geo);
}

// ─────────────────────────────────────────────────────────────
// 5. RIGHT SIDE WALL — rectangle, height Hr
//    outer face x=W, inner face x=W-T
//    top of outer: Hr, top of inner: topH(W-T)
{
  const hOuter = Hr;
  const hInner = topH(W - T);

  const v = new Float32Array([
    W-T, 0,      0,
    W,   0,      0,
    W,   hOuter, 0,
    W-T, hInner, 0,
    W-T, 0,      -D,
    W,   0,      -D,
    W,   hOuter, -D,
    W-T, hInner, -D,
  ]);
  const idx = [
    0,1,2, 0,2,3,
    4,6,5, 4,7,6,
    0,4,5, 0,5,1,
    3,2,6, 3,6,7,
    0,3,7, 0,7,4,
    1,5,6, 1,6,2,
  ];
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(v, 3));
  geo.setIndex(idx);
  geo.computeVertexNormals();
  mesh(geo);
}

// ─────────────────────────────────────────────────────────────
// 6. TOP PANEL — follows the slope, closes the top
//    A slanted rectangle from (0, Hl, 0) to (W, Hr, 0) in front
//    and (0, Hl, -D) to (W, Hr, -D) in back, thickness T downward
{
  // Slope vector in XY: dY = Hr - Hl over W
  // For thickness T perpendicular to surface — approximate as vertical inset
  // (since slope is gentle, vertical T is fine for visual purposes)
  const v = new Float32Array([
    // outer top (y = topH(x), z = 0 or -D)
    0, Hl,   0,
    W, Hr,   0,
    W, Hr,   -D,
    0, Hl,   -D,
    // inner top (offset T downward along slope normal — use vertical approx)
    0, Hl-T, 0,
    W, Hr-T, 0,
    W, Hr-T, -D,
    0, Hl-T, -D,
  ]);
  const idx = [
    // top face (outer)
    0,3,2, 0,2,1,
    // bottom face (inner)
    4,5,6, 4,6,7,
    // front face
    0,1,5, 0,5,4,
    // back face
    3,7,6, 3,6,2,
    // left end
    0,4,7, 0,7,3,
    // right end
    1,2,6, 1,6,5,
  ];
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(v, 3));
  geo.setIndex(idx);
  geo.computeVertexNormals();
  mesh(geo);
}

// ─────────────────────────────────────────────────────────────
// 7. MOUNTING TABS
// ─────────────────────────────────────────────────────────────
const tabW  = 2.2;
const tabH  = 1.8;
const tabY  = 4.0;
const tabBW = 2.0;
const tabBH = 2.2;
const tabZ  = -(D - T/2);   // flush with back wall (centre of back plate)

function addBox(w, h, d, cx, cy, cz) {
  const geo = new THREE.BoxGeometry(w, h, d);
  const m = new THREE.Mesh(geo, mat);
  m.position.set(cx, cy, cz);
  m.castShadow = true; m.receiveShadow = true;
  group.add(m);
}

addBox(tabW, tabH, T, -tabW/2,    tabY,     tabZ);
addBox(tabW, tabH, T,  W+tabW/2,  tabY,     tabZ);
addBox(tabBW, tabBH, T, W/2,     -tabBH/2,  tabZ);

// ─────────────────────────────────────────────────────────────
// 8. SCREW HOLES — simple dark cylinders
// ─────────────────────────────────────────────────────────────
const holeGeo = new THREE.CylinderGeometry(0.22, 0.22, T + 0.05, 28);
function addHole(x, y, z) {
  const h = new THREE.Mesh(holeGeo, holeMat);
  h.rotation.x = Math.PI / 2;
  h.position.set(x, y, z);
  group.add(h);
}
addHole(-tabW/2,   tabY,    tabZ);
addHole(W+tabW/2,  tabY,    tabZ);
addHole(W/2,      -tabBH/2, tabZ);

// ─── Centre group ──────────────────────────────────────────────
group.position.set(-W/2, -Hl/2 + 1.5, D/2);

// ─── Camera start ──────────────────────────────────────────────
let rotX = -0.18, rotY = 0.6, panX = 0, panY = 0, zoom = 1;

// ─── Interaction ───────────────────────────────────────────────
let drag = false, rightBtn = false, lx = 0, ly = 0;
let autoRotate = true;

const autoBtn = document.getElementById('autoBtn');
autoBtn.addEventListener('click', () => {
  autoRotate = !autoRotate;
  autoBtn.classList.toggle('active', autoRotate);
});

const cv = renderer.domElement;
cv.addEventListener('mousedown', e => {
  drag = true; rightBtn = e.button === 2; lx = e.clientX; ly = e.clientY;
  autoRotate = false; autoBtn.classList.remove('active');
});
cv.addEventListener('contextmenu', e => e.preventDefault());
window.addEventListener('mouseup', () => drag = false);
window.addEventListener('mousemove', e => {
  if (!drag) return;
  const dx = (e.clientX - lx) * 0.008, dy = (e.clientY - ly) * 0.008;
  if (rightBtn) { panX -= dx * zoom * 3; panY += dy * zoom * 3; }
  else { rotY += dx; rotX = Math.max(-1.4, Math.min(1.4, rotX + dy)); }
  lx = e.clientX; ly = e.clientY;
});
cv.addEventListener('wheel', e => {
  zoom = Math.max(0.15, Math.min(6, zoom * (1 + e.deltaY * 0.001)));
}, { passive: true });

let ltd = 0;
cv.addEventListener('touchstart', e => {
  autoRotate = false; autoBtn.classList.remove('active');
  if (e.touches.length === 1) { drag = true; lx = e.touches[0].clientX; ly = e.touches[0].clientY; }
  else if (e.touches.length === 2) ltd = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
});
cv.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1 && drag) {
    const dx = (e.touches[0].clientX - lx) * 0.012, dy = (e.touches[0].clientY - ly) * 0.012;
    rotY += dx; rotX = Math.max(-1.4, Math.min(1.4, rotX + dy));
    lx = e.touches[0].clientX; ly = e.touches[0].clientY;
  } else if (e.touches.length === 2) {
    const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    zoom = Math.max(0.15, Math.min(6, zoom * (ltd / d))); ltd = d;
  }
}, { passive: false });
cv.addEventListener('touchend', () => drag = false);

// ─── Render loop ───────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  if (autoRotate) rotY += 0.004;
  const r = 28 * zoom;
  camera.position.x = panX + r * Math.sin(rotY) * Math.cos(rotX);
  camera.position.y = panY + r * Math.sin(rotX);
  camera.position.z =        r * Math.cos(rotY) * Math.cos(rotX);
  camera.lookAt(panX, panY, 0);
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
